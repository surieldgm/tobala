services:
  db:
    build:
      context: ./packages/django-agave
      dockerfile: Dockerfile.pg
    container_name: tobala-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tobala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tobala_dev}
      POSTGRES_DB: ${POSTGRES_DB:-tobala}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tobala} -d ${POSTGRES_DB:-tobala}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tobala-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tobala-backend
    working_dir: /app
    environment: &backend-env
      POSTGRES_USER: ${POSTGRES_USER:-tobala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tobala_dev}
      POSTGRES_DB: ${POSTGRES_DB:-tobala}
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LINKING_PROVIDER: ${LINKING_PROVIDER:-openai}
      LINKING_MODEL: ${LINKING_MODEL:-gpt-4o-mini}
      RETRIEVAL_PROVIDER: ${RETRIEVAL_PROVIDER:-openai}
      RETRIEVAL_MODEL: ${RETRIEVAL_MODEL:-gpt-4o}
      TAGGING_PROVIDER: ${TAGGING_PROVIDER:-openai}
      TAGGING_MODEL: ${TAGGING_MODEL:-gpt-4o-mini}
    volumes:
      - ./apps/backend:/app
      - ./packages/django-agave:/opt/django-agave
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tobala-worker
    working_dir: /app
    environment: *backend-env
    command: celery -A tobala_project worker -l info --concurrency=2
    volumes:
      - ./apps/backend:/app
      - ./packages/django-agave:/opt/django-agave
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tobala-frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/notes/}
    volumes:
      - ./apps/frontend:/app
      # Anonymous volume keeps container's node_modules separate from host,
      # so the image's installed deps aren't shadowed by the bind mount.
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
